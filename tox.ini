[testenv]
commands=
    pip install -e .
    pytest -p no:logging --cov=src/promisio --cov-branch --cov-report=term-missing --cov-report=xml tests
deps=
    pytest
    pytest-cov

[testenv:flake8]
deps=
    flake8
commands=
    flake8 --ignore=F401,F403 --exclude=".*" src/promisio tests

[testenv:docs]
changedir=docs
deps=
    sphinx
allowlist_externals=
    make
commands=
    make html
